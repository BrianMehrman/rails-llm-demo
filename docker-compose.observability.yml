services:
  jaeger:
    image: jaegertracing/jaeger:2.1.0
    ports:
      - "4318:4318"   # OTLP HTTP receiver
      - "16686:16686" # Jaeger UI
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  prometheus:
    image: prom/prometheus:v3.1.0
    ports:
      - "9090:9090"
    environment:
      - RAILS_METRICS_TARGET=${RAILS_METRICS_TARGET:-host.docker.internal:3000}
    volumes:
      - ./config/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--enable-feature=expand-env-vars"

  loki:
    image: grafana/loki:3.3.2
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - jaeger

  fluent-bit:
    image: fluent/fluent-bit:3.2
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/observability/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./config/observability/parsers.conf:/fluent-bit/etc/parsers.conf:ro
    depends_on:
      - loki

volumes:
  grafana-data:
