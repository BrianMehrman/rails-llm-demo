apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: rails-llm-demo-deps
# Shared dependency stack for parallel local development.
#
# Deploys ONE set of dependencies (postgres, redis, observability) into the
# `default` namespace, reused by every git worktree. Each worktree runs only
# its own local Rails server (bin/dev) against these on fixed localhost ports.
#
# There is no rails-app release and no build section here — Rails runs locally,
# not in-cluster. Dependency services are exposed as LoadBalancer so docker-desktop
# binds them to localhost with no `kubectl port-forward` process to babysit.
#
# Bring up / reconcile:  skaffold run -f skaffold.deps.yaml
# Tear down:             skaffold delete -f skaffold.deps.yaml
#
# Fixed localhost ports: postgres 5432 · redis 6379 · grafana 3001 · prometheus 9090
deploy:
  helm:
    releases:
      - name: postgres
        chartPath: charts/postgres
        valuesFiles:
          - charts/postgres/values.yaml
        namespace: default
        createNamespace: true
        setValues:
          service.type: LoadBalancer
      - name: redis
        chartPath: charts/redis
        valuesFiles:
          - charts/redis/values.yaml
        namespace: default
        createNamespace: true
        setValues:
          service.type: LoadBalancer
      # kube-prometheus-stack installs the monitoring.coreos.com CRDs that any
      # ServiceMonitor depends on; it must deploy before workloads that define one.
      - name: kube-prometheus-stack
        remoteChart: kube-prometheus-stack
        repo: https://prometheus-community.github.io/helm-charts
        version: "65.1.1"
        valuesFiles:
          - charts/kube-prometheus-stack/values.yaml
        namespace: default
        createNamespace: true
        setValues:
          # Expose Grafana on localhost:3001 and Prometheus on localhost:9090.
          grafana.service.type: LoadBalancer
          grafana.service.port: 3001
          prometheus.service.type: LoadBalancer
          prometheus.service.port: 9090
      - name: loki
        remoteChart: loki
        repo: https://grafana.github.io/helm-charts
        version: "6.18.0"
        valuesFiles:
          - charts/loki/values.yaml
        namespace: default
        createNamespace: true
      - name: jaeger
        remoteChart: jaeger
        repo: https://jaegertracing.github.io/helm-charts
        version: "3.3.1"
        valuesFiles:
          - charts/jaeger/values.yaml
        namespace: default
        createNamespace: true
      - name: fluent-bit
        remoteChart: fluent-bit
        repo: https://fluent.github.io/helm-charts
        version: "0.47.9"
        valuesFiles:
          - charts/fluent-bit/values.yaml
        namespace: default
        createNamespace: true
