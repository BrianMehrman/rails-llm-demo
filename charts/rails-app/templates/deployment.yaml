apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rails-app.fullname" . }}
  labels:
    {{- include "rails-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "rails-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rails-app.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        # Create the primary/queue/cable/cache databases and load their schemas
        # before the app boots. db:prepare is idempotent — it loads the schema on
        # first run and applies any pending migrations on subsequent deploys, so it
        # is safe to run on every rollout. Without this the app 500s on the first
        # DB-backed request ("relation \"chats\" does not exist").
        - name: db-prepare
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bin/rails", "db:prepare"]
          envFrom:
            - configMapRef:
                name: {{ include "rails-app.fullname" . }}-env
      containers:
        - name: rails-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: {{ include "rails-app.fullname" . }}-env
          livenessProbe:
            httpGet:
              path: /up
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /up
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
