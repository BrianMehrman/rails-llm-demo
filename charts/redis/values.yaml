image:
  repository: redis
  tag: "7-alpine"

service:
  type: ClusterIP
  port: 6379

storage:
  # Used when storage.pvc.enabled is false (default for local development)
  hostPath: /tmp/rails-llm-demo/redis
  pvc:
    enabled: false
    # storageClass: "" means use the cluster's default StorageClass.
    storageClass: ""
    size: 512Mi
