# Fluent Bit values for local Kubernetes development
# Chart version: 0.47.9 (fluent/fluent-bit)
# Deployed as a DaemonSet to collect logs from all pods and forward to Loki

customParsers: |
  [PARSER]
      Name        rails_json
      Format      json
      Time_Key    timestamp
      Time_Format %Y-%m-%dT%H:%M:%S.%LZ

config:
  service: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off
        Parsers_File  /fluent-bit/etc/parsers.conf

  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        multiline.parser  docker, cri
        Tag               kube.*
        Refresh_Interval  5
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On

    [INPUT]
        Name              tail
        Path              /var/log/containers/rails-llm-demo*.log
        Parser            rails_json
        Tag               kube.rails.*
        Refresh_Interval  5
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

    [FILTER]
        Name    record_modifier
        Match   kube.*
        Record  app rails-llm-demo
        Record  env local

  outputs: |
    [OUTPUT]
        Name        loki
        Match       kube.*
        Host        loki.default.svc.cluster.local
        Port        3100
        Labels      job=fluent-bit,app=rails-llm-demo
        Line_Format json
        auto_kubernetes_labels on

daemonSet:
  enabled: true

serviceAccount:
  create: true
