# Jaeger values for local Kubernetes development
# Chart version: 3.3.1 (jaegertracing/jaeger)

# Use in-memory storage — fine for local dev, no persistence needed
provisionDataStore:
  cassandra: false
  elasticsearch: false
  kafka: false

allInOne:
  enabled: true
  image:
    tag: latest
  args:
    - "--memory.max-traces=10000"
  # COLLECTOR_OTLP_ENABLED is injected automatically by the chart in all-in-one
  # mode — setting it again here produces a duplicate env key and an invalid
  # Deployment patch, so do not re-add it.

storage:
  type: memory

# All-in-one mode already renders jaeger-collector (OTLP http 4318, grpc 4317)
# and jaeger-query (16686) services pointing at the all-in-one pod. The separate
# production components default to enabled and would render a SECOND, name-colliding
# set of collector/query services (one with an unnamed OTLP-grpc port), which fails
# to install. Disable them so only the all-in-one services remain.
collector:
  enabled: false

query:
  enabled: false

agent:
  enabled: false
