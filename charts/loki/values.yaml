# Loki values for local Kubernetes development
# Chart version: 6.18.0 (grafana/loki)

# Use single-binary (monolithic) deployment mode for local dev simplicity
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

singleBinary:
  replicas: 1

# Disable components not needed in single-binary mode
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Disable MinIO (using filesystem storage)
minio:
  enabled: false
